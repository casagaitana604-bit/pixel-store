<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Subir Evidencias</title>
    <style>
        :root { 
            --neon-green: #39FF14; 
            --neon-orange: #FF5F1F; 
            --neon-blue: #00ffff;
            --card: rgba(13, 13, 13, 0.9);
        }
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; text-transform: uppercase; margin: 0; }
        .main-nav { 
            background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; 
            border-bottom: 2px solid var(--neon-orange); box-shadow: 0 0 15px var(--neon-orange);
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-logo { font-weight:bold; letter-spacing:3px; color:#fff; text-decoration: none; }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-green); }
        .upload-container {
            max-width: 600px; margin: 50px auto; padding: 30px;
            background: var(--card); border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); text-align: center;
        }
        .preview-img { width: 100%; max-height: 300px; object-fit: contain; margin: 20px 0; border: 1px dashed #444; display: none; }
        input[type="file"] { display: none; }
        .custom-file-upload {
            display: inline-block; padding: 12px 30px; cursor: pointer;
            border: 1px solid var(--neon-blue); color: var(--neon-blue);
            font-weight: bold; transition: 0.3s; margin-bottom: 20px;
        }
        button {
            width: 100%; padding: 15px; background: var(--neon-green);
            color: #000; border: none; font-weight: bold; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s;
        }
        input[type="text"] {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #fff; margin-bottom: 20px; box-sizing: border-box; outline: none;
        }
        #status { margin-top:20px; font-size:0.8rem; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo">PIXEL <span style="color:var(--neon-green)">SURVIVAL</span></a>
    <div class="nav-links">
        <a href="index.html">DASHBOARD</a>
        <a href="facciones.html">FACCIONES</a>
        <a href="galeria.html">GALERÍA</a>
    </div>
</nav>

<div class="upload-container">
    <h2 style="color:var(--neon-green); letter-spacing:5px;">SUBIR EVIDENCIA</h2>
    <label class="custom-file-upload">
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        SELECCIONAR CAPTURA
    </label>
    <img id="imagePreview" class="preview-img">
    <input type="text" id="avatarName" placeholder="NOMBRE DEL OPERATIVO">
    <input type="text" id="description" placeholder="DETALLES DE LA OPERACIÓN">
    <button id="btnEnviar" onclick="uploadToCloud()">TRANSMITIR A LA RED</button>
    <p id="status"></p>
</div>

<script>
    // USA TU URL DE SIEMPRE
    const API_URL = "https://script.google.com/macros/s/AKfycbx6441EwuvijM3_JYnzn7r2J5L9Xl266p4y58ysro8jByMeE5FVAssyYYp4h05qpNiN/exec";

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('imagePreview');
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

async function uploadToCloud() {
    const file = document.getElementById('fileInput').files[0];
    const name = document.getElementById('avatarName').value;
    const desc = document.getElementById('description').value;
    const status = document.getElementById('status');

    if (!file || !name) {
        status.innerText = "❌ ERROR: FALTA IMAGEN O NOMBRE";
        return;
    }

    status.innerText = "📡 TRANSMITIENDO EVIDENCIA...";
    
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async function() {
        const base64String = reader.result.split(',')[1];
        
        // Creamos el paquete de datos
        const datosParaEnviar = {
            imagen_base64: base64String,
            nombre_avatar: name,
            descripcion: desc
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                // Enviamos como text/plain para que Google no se ponga tonto con los permisos CORS
                headers: { "Content-Type": "text/plain" }, 
                body: JSON.stringify(datosParaEnviar),
                mode: "no-cors"
            });
            
            status.innerText = "✅ DATOS ENVIADOS AL EXCEL";
            status.style.color = "#39FF14";
            // Limpiar campos
            document.getElementById('avatarName').value = "";
            document.getElementById('description').value = "";
            document.getElementById('imagePreview').style.display = "none";
            
        } catch (e) {
            status.innerText = "❌ ERROR DE RED";
        }
    };
}
</script>
</body>
</html>
