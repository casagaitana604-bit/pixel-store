<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Galería</title>
    <style>
        :root { --neon-green: #39FF14; --neon-orange: #FF5F1F; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-transform: uppercase; }
        .main-nav { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 2px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green); position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 0.8rem; }
        .header { text-align: center; padding: 40px; background: linear-gradient(to bottom, #111, #050505); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 40px; max-width: 1400px; margin: auto; }
        .evidence-card { background: #0d0d0d; border: 1px solid #222; border-radius: 5px; overflow: hidden; transition: 0.4s; }
        .evidence-img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .evidence-info { padding: 15px; }
        .author-tag { color: var(--neon-green); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
<nav class="main-nav">
    <div style="font-weight:bold; letter-spacing:3px;">PIXEL <span style="color:var(--neon-green)">SURVIVAL</span></div>
    <div class="nav-links">
        <a href="index.html">DASHBOARD</a>
        <a href="facciones.html">FACCIONES</a>
        <a href="galeria.html" style="color:var(--neon-orange)">GALERÍA</a>
    </div>
</nav>
<div class="header"><h1>ARCHIVOS DE <span style="color:var(--neon-orange)">COMBATE</span></h1></div>
<div class="gallery-grid" id="gallery"><p id="loading">ACCEDIENDO A LA BASE DE DATOS...</p></div>
<script>
    const API = "https://script.google.com/macros/s/AKfycbwF5gqdh_rWNw51ACHegR92urc9OoZQlNpDJlayRu2JTr7l34_QnW6JsAua__qhzAxd/exec";
    async function loadGallery() {
        try {
            const res = await fetch(API + "?accion=GET_EVIDENCIAS");
            const data = await res.json();
            const container = document.getElementById('gallery');
            document.getElementById('loading').remove();
            data.evidencias.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'evidence-card';
                card.innerHTML = `<img src="${ev.url}" class="evidence-img" onclick="window.open('${ev.url}')"><div class="evidence-info"><span class="author-tag">OPERATIVO: ${ev.autor}</span><p style="font-size:0.7rem; color:#888;">${ev.desc}</p></div>`;
                container.appendChild(card);
            });
        } catch (e) { document.getElementById('loading').innerText = "❌ ERROR AL CARGAR"; }
    }
    loadGallery();
</script>
</body>
</html>
