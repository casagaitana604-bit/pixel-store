<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Galería</title>
    <style>
        :root { --neon-green: #39FF14; --neon-orange: #FF5F1F; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-transform: uppercase; }
        .main-nav { 
            background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; 
            border-bottom: 2px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green);
        }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 0.8rem; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 40px; max-width: 1400px; margin: auto;
        }
        .evidence-card {
            background: #0d0d0d; border: 1px solid #222; border-radius: 5px; overflow: hidden;
            transition: 0.4s;
        }
        .evidence-card:hover { border-color: var(--neon-orange); transform: translateY(-5px); }
        .evidence-img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .evidence-info { padding: 15px; }
        .author-tag { color: var(--neon-green); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="main-nav">
    <div style="font-weight:bold; letter-spacing:3px;">PIXEL <span style="color:var(--neon-green)">SURVIVAL</span></div>
    <div class="nav-links">
        <a href="index.html">DASHBOARD</a>
        <a href="facciones.html">FACCIONES</a>
        <a href="galeria.html" style="color:var(--neon-orange)">GALERÍA</a>
    </div>
</nav>

<div style="text-align:center; padding:40px;">
    <h1 style="letter-spacing:10px;">ARCHIVOS DE <span style="color:var(--neon-orange)">COMBATE</span></h1>
</div>

<div class="gallery-grid" id="gallery">
    <p id="loading" style="text-align:center; width:100%; grid-column: 1/-1;">ACCEDIENDO A LA RED...</p>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzyIEEeA69DQndmtHpgiORRHM1ETNBLhzrGtMLinG8Jrox9rt99BLi-LE5EYItoLVOq/exec";

    async function loadGallery() {
        try {
            const res = await fetch(API + "?accion=GET_EVIDENCIAS");
            const data = await res.json();
            const container = document.getElementById('gallery');
            const loader = document.getElementById('loading');
            if(loader) loader.remove();

            if (!data.evidencias || data.evidencias.length === 0) {
                container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>SIN REGISTROS.</p>";
                return;
            }

            data.evidencias.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'evidence-card';
                card.innerHTML = `
                    <img src="${ev.url}" class="evidence-img" onclick="window.open('${ev.url}')">
                    <div class="evidence-info">
                        <span class="author-tag">OPERATIVO: ${ev.autor}</span>
                        <p style="color:#888; font-size:0.7rem; margin:5px 0;">${ev.desc || 'SIN DETALLES'}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loading').innerText = "❌ ERROR AL CARGAR";
        }
    }
    loadGallery();
</script>
</body>
</html>
