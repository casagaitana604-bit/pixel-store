<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Galería de Evidencias</title>
    <style>
        :root { 
            --neon-green: #39FF14; 
            --neon-orange: #FF5F1F; 
            --bg: #050505;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-transform: uppercase;
        }
        .header {
            text-align: center; padding: 40px; border-bottom: 2px solid var(--neon-green);
            background: linear-gradient(to bottom, #111, #050505);
        }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 40px; max-width: 1400px; margin: auto;
        }
        .evidence-card {
            background: #0d0d0d; border: 1px solid #222; border-radius: 5px; overflow: hidden;
            transition: 0.4s; position: relative;
        }
        .evidence-card:hover {
            border-color: var(--neon-orange); transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 95, 31, 0.2);
        }
        .evidence-img {
            width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #222;
            cursor: pointer; transition: 0.3s;
        }
        .evidence-img:hover { filter: brightness(1.2); }
        .evidence-info { padding: 15px; }
        .author-tag { color: var(--neon-green); font-weight: bold; font-size: 0.8rem; display: block; }
        .desc-tag { color: #888; font-size: 0.75rem; margin-top: 5px; display: block; }
        
        .btn-upload {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--neon-orange); color: #000; padding: 15px 30px;
            text-decoration: none; font-weight: bold; border-radius: 50px;
            box-shadow: 0 0 20px var(--neon-orange); z-index: 100;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="letter-spacing:10px; margin:0;">ARCHIVOS DE <span style="color:var(--neon-orange)">COMBATE</span></h1>
    <p style="color:var(--neon-green); font-size:0.8rem;">REGISTRO VISUAL DE BAJAS CONFIRMADAS</p>
    <a href="index.html" style="color:#555; text-decoration:none; font-size:0.7rem;">[ VOLVER AL DASHBOARD ]</a>
</div>

<div class="gallery-grid" id="gallery">
    <p id="loading" style="text-align:center; width:100%; grid-column: 1/-1;">ACCEDIENDO A LA BASE DE DATOS VISUAL...</p>
</div>

<a href="evidencias.html" class="btn-upload">+ SUBIR NUEVA EVIDENCIA</a>

<script>
    const API = "TU_URL_DE_API_GOOGLE"; // PON TU URL AQUÍ

    async function loadGallery() {
        try {
            const res = await fetch(API + "?accion=GET_EVIDENCIAS");
            const data = await res.json();
            const container = document.getElementById('gallery');
            document.getElementById('loading').remove();

            if (data.evidencias.length === 0) {
                container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>NO HAY EVIDENCIAS REGISTRADAS TODAVÍA.</p>";
                return;
            }

            data.evidencias.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'evidence-card';
                card.innerHTML = `
                    <img src="${ev.url}" class="evidence-img" onclick="window.open('${ev.url}')">
                    <div class="evidence-info">
                        <span class="author-tag">OPERATIVO: ${ev.autor}</span>
                        <span class="desc-tag">${ev.desc || 'SIN DESCRIPCIÓN ADICIONAL'}</span>
                        <small style="color:#444; font-size:0.6rem; display:block; margin-top:10px;">${new Date(ev.fecha).toLocaleString()}</small>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loading').innerText = "❌ ERROR AL SINCRONIZAR GALERÍA";
        }
    }

    loadGallery();
</script>
</body>
</html>
