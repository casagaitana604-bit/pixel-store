<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Facciones</title>
    <style>
        :root { --primary: #ff4500; --gold: #ffd700; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ccc; margin: 0; }
        
        /* NAVBAR REPETIDO PARA CONSISTENCIA */
        .main-nav { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { color: #fff; font-weight: bold; font-size: 1.4rem; letter-spacing: 2px; }
        .nav-logo span { color: var(--primary); }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 0.9rem; }
        .nav-active { color: var(--primary) !important; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .top-card { background: #111; border: 1px solid var(--gold); padding: 20px; border-radius: 10px; }
        .top-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }

        .fac-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .fac-card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .gen-btn { cursor: pointer; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-left: 10px; font-size: 0.7rem; }
        .male { background: #0055ff; color: white; }
        .female { background: #ff0077; color: white; }
    </style>
</head>
<body>

<nav class="main-nav">
    <div class="nav-logo">PIXEL RPG <span>SURVIVAL</span></div>
    <div class="nav-links">
        <a href="index.html">INICIO</a>
        <a href="facciones.html" class="nav-active">FACCIONES / TOPS</a>
    </div>
</nav>

<div class="container">
    <div class="top-grid">
        <div class="top-card"><h3>🏆 TOP XP</h3><div id="top-xp"></div></div>
        <div class="top-card"><h3>💀 TOP KILLS</h3><div id="top-kills"></div></div>
    </div>
    <div id="facciones-list" class="fac-grid"></div>
</div>

<script>
    const API = "REEMPLAZA_CON_TU_URL";

    async function load() {
        const res = await fetch(API);
        const data = await res.json();
        const facList = document.getElementById('facciones-list');
        facList.innerHTML = '';
        let all = [];

        data.forEach(f => {
            all = all.concat(f.lista_integrantes);
            let html = `<div class="fac-card"><h2>${f.nombre}</h2><small>Comandante: ${f.comandante}</small><hr>`;
            f.lista_integrantes.forEach(j => {
                html += `<div style="margin: 10px 0;">${j.nombre} 
                    <button class="gen-btn ${j.genero == 'm' ? 'male' : 'female'}" onclick="changeG('${j.uuid}','${j.genero}')">
                    ${j.genero == 'm' ? '♂' : '♀'}</button></div>`;
            });
            facList.innerHTML += html + `</div>`;
        });

        // TOP XP
        document.getElementById('top-xp').innerHTML = [...all].sort((a,b)=>b.xp-a.xp).slice(0,5).map(j=>`<div class="top-item"><span>${j.nombre}</span><span>${j.xp} XP</span></div>`).join('');
        // TOP KILLS
        document.getElementById('top-kills').innerHTML = [...all].sort((a,b)=>(parseInt(b.npc)+parseInt(b.pvp))-(parseInt(a.npc)+parseInt(a.pvp))).slice(0,5).map(j=>`<div class="top-item"><span>${j.nombre}</span><span>${parseInt(j.npc)+parseInt(j.pvp)}</span></div>`).join('');
    }

    async function changeG(id, g) {
        let ng = g == 'm' ? 'f' : 'm';
        alert("Cambiando género...");
        await fetch(`${API}?action=setGender&id=${id}&genero=${ng}`, {method:'POST'});
        load();
    }
    load();
</script>
</body>
</html>
