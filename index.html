<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL RPG - Dashboard</title>
    <style>
        :root { --primary: #ff4500; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* NAVBAR */
        .main-nav { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { color: #fff; font-weight: bold; font-size: 1.4rem; letter-spacing: 2px; }
        .nav-logo span { color: var(--primary); }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 0.9rem; }
        .nav-active { color: var(--primary) !important; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }

        /* CONTENIDO */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: var(--card); padding: 25px; border-radius: 10px; text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-box h2 { font-size: 2.5rem; margin: 10px 0; color: #fff; }

        .survival-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        .survival-table th { background: #222; color: var(--primary); padding: 15px; text-align: left; }
        .survival-table td { padding: 15px; border-bottom: 1px solid #282828; }
        
        .rango { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: #000; }
        .HEROE { background: #ffd700; } .MAESTRO { background: #00d4ff; } .SOLDADO { background: #888; }
        .loading { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>
<body>

<nav class="main-nav">
    <div class="nav-logo">PIXEL RPG <span>SURVIVAL</span></div>
    <div class="nav-links">
        <a href="index.html" class="nav-active">INICIO</a>
        <a href="facciones.html">FACCIONES / TOPS</a>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-box"><span>JUGADORES</span><h2 id="count-jug">0</h2></div>
        <div class="stat-box"><span>ZOMBIES ABATIDOS</span><h2 id="count-npc">0</h2></div>
        <div class="stat-box"><span>BAJAS PVP</span><h2 id="count-pvp">0</h2></div>
    </div>

    <table class="survival-table">
        <thead>
            <tr>
                <th>JUGADOR</th>
                <th>RANGO</th>
                <th>NIVEL</th>
                <th>XP TOTAL</th>
                <th>KILLS (NPC/PVP)</th>
            </tr>
        </thead>
        <tbody id="table-players"><tr><td colspan="5" class="loading">Sincronizando datos...</td></tr></tbody>
    </table>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycby1ttmSQQZwIORCcPe-xsnrhym2kNBxKFt1vlrozut7iVq7hHsNvdxUjtDIwaWZiFsD/exec";
    async function fetchData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            let players = [], npc = 0, pvp = 0;
            const body = document.getElementById('table-players');
            body.innerHTML = '';

            data.forEach(f => {
                f.lista_integrantes.forEach(j => {
                    players.push(j);
                    npc += parseInt(j.npc); pvp += parseInt(j.pvp);
                    let rng = j.nivel >= 90 ? "HEROE" : j.nivel >= 40 ? "MAESTRO" : "SOLDADO";
                    body.innerHTML += `
                        <tr>
                            <td>${j.nombre}</td>
                            <td><span class="rango ${rng}">${rng}</span></td>
                            <td>${j.nivel}</td>
                            <td>${j.xp}</td>
                            <td>💀 ${j.npc} / ⚔️ ${j.pvp}</td>
                        </tr>`;
                });
            });
            document.getElementById('count-jug').innerText = players.length;
            document.getElementById('count-npc').innerText = npc;
            document.getElementById('count-pvp').innerText = pvp;
        } catch (e) { console.error(e); }
    }
    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
