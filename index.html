<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Survival Leaderboard</title>
    <style>
        /* ESTILO GAMER SURVIVAL */
        body {
            background-color: #0b0b0b;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0; padding: 20px;
        }
        h1 { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        .container {
            max-width: 900px;
            margin: auto;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #00ff41;
            color: #000;
            padding: 12px;
            text-transform: uppercase;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        tr:hover { background: #252525; }
        .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.2em; } /* Oro */
        .rank-2 { color: #c0c0c0; font-weight: bold; } /* Plata */
        .rank-3 { color: #cd7f32; font-weight: bold; } /* Bronce */
    </style>
</head>
<body>

    <div class="container">
        <h1>PIXEL STORE - RANKING GLOBAL</h1>
        <p>Sincronizado en tiempo real con el sistema RPG Survival</p>
        
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>Nivel</th>
                    <th>Bajas (NPC)</th>
                    <th>PVP Kills</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const SHEET_ID = '1B_pbsnPwrVCwwMXEag7ILOdpav_gss2qVezE5yS-DUQ';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function cargarDatos() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                // Limpiamos la respuesta de Google
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const filas = json.table.rows;
                const tbody = document.querySelector('#leaderboard tbody');

                // Ordenar por Nivel (Columna index 2) de mayor a menor
                filas.sort((a, b) => {
                    let nivelA = a.c[2] ? a.c[2].v : 0;
                    let nivelB = b.c[2] ? b.c[2].v : 0;
                    return nivelB - nivelA;
                });

                tbody.innerHTML = '';
                
                filas.forEach((fila, index) => {
                    // Verificación de seguridad para celdas vacías
                    let nombre = fila.c[1] ? fila.c[1].v : "Desconocido";
                    let nivel  = fila.c[2] ? fila.c[2].v : 0;
                    let npc    = fila.c[4] ? fila.c[4].v : 0;
                    let pvp    = fila.c[5] ? fila.c[5].v : 0;

                    let rowHtml = `
                        <tr class="rank-${index + 1}">
                            <td>${index + 1}</td>
                            <td style="color: #00ff41; font-weight: bold;">${nombre}</td>
                            <td>${nivel}</td>
                            <td>${npc}</td>
                            <td>${pvp}</td>
                        </tr>`;
                    tbody.innerHTML += rowHtml;
                });
            } catch (error) {
                console.error("Error cargando datos de Google:", error);
            }
        }

        // Ejecutar al cargar y cada 30 segundos
        cargarDatos();
        setInterval(cargarDatos, 30000);
    </script>
</body>
</html>
