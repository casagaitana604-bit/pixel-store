<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Ultimate Dashboard</title>
    <style>
        /* ESTILO GLOBAL CYBER-SURVIVAL */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-attachment: fixed;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        .container { 
            max-width: 1000px; margin: auto; 
            background: rgba(20, 20, 20, 0.95);
            padding: 30px; border-radius: 15px; 
            border: 2px solid #00ff41; 
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15);
            backdrop-filter: blur(10px);
        }

        h1 { color: #00ff41; text-shadow: 0 0 20px #00ff41; font-size: 3em; letter-spacing: 5px; margin: 0; }
        .subtitle { color: #00ff41; opacity: 0.6; letter-spacing: 3px; margin-bottom: 20px; font-size: 12px; }

        /* OBJETIVO GLOBAL */
        .event-container { 
            margin-bottom: 30px; text-align: left; 
            background: rgba(0,0,0,0.6); padding: 15px; 
            border-radius: 10px; border: 1px solid #333; 
        }
        .event-title { color: #00ff41; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .progress-bar-bg { width: 100%; height: 18px; background: #111; border-radius: 9px; overflow: hidden; border: 1px solid #00ff41; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #004411, #00ff41); width: 0%; transition: 2s ease-in-out; box-shadow: 0 0 15px #00ff41; }

        /* PODIO DE CAMPEONES */
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 40px 0; }
        .podium-card {
            background: rgba(0,0,0,0.7); border: 1px solid #333;
            border-radius: 10px; padding: 20px; flex: 1; transition: 0.3s;
        }
        .rank-gold { border-top: 5px solid #ffd700; height: 180px; box-shadow: 0 0 25px rgba(255,215,0,0.2); order: 2; }
        .rank-silver { border-top: 5px solid #c0c0c0; height: 150px; order: 1; }
        .rank-bronze { border-top: 5px solid #cd7f32; height: 130px; order: 3; }
        .podium-card h2 { margin: 10px 0 5px; font-size: 1.1em; color: #fff; }
        .gold-txt { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        /* STATS Y BUSCADOR */
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px; }
        .stat-box { 
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 10px; 
            flex: 1; border: 1px solid #333; border-bottom: 4px solid #00ff41; 
        }
        .stat-box small { color: #00ff41; font-size: 11px; text-transform: uppercase; }
        .stat-box div { color: #fff; font-size: 26px; font-weight: bold; }

        .search-container { margin-bottom: 25px; display: flex; gap: 10px; }
        #searchInput { 
            flex-grow: 1; padding: 15px; background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #00ff41; color: #00ff41; border-radius: 8px; outline: none; font-size: 16px;
        }
        .btn-refresh { background: #00ff41; color: #000; border: none; padding: 0 25px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 24px; transition: 0.3s; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.5); }
        th { background: #00ff41; color: #000; padding: 15px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        tr:hover td { background: rgba(0, 255, 65, 0.1); }
        .name-cell { display: flex; align-items: center; justify-content: center; color: #00ff41; font-weight: bold; }
        
        /* RANGOS */
        .badge { font-size: 18px; margin-right: 8px; }
        .rango-txt { font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 10px; border: 1px solid; }
        .r-recluta { color: #cd7f32; border-color: #cd7f32; }
        .r-veterano { color: #c0c0c0; border-color: #c0c0c0; }
        .r-elite { color: #ffd700; border-color: #ffd700; }
        .r-leyenda { color: #00f2ff; border-color: #00f2ff; text-shadow: 0 0 10px #00f2ff; animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        /* FICHA TÉCNICA (MODAL) */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { 
            background: #111; margin: 5% auto; padding: 30px; border: 2px solid #00ff41; 
            width: 400px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,255,65,0.4);
            position: relative;
        }
        .avatar-box { width: 90px; height: 90px; border: 2px solid #00ff41; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #000; box-shadow: 0 0 15px #00ff41; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .data-item { background: #222; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .data-item small { color: #00ff41; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .data-item span { font-size: 18px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>PIXEL STORE</h1>
    <div class="subtitle">SISTEMA RPG SURVIVAL - EXPEDIENTES GLOBALES</div>

    <div class="event-container">
        <div style="display:flex; justify-content:space-between; color:#00ff41; font-weight:bold; font-size:14px; margin-bottom:10px;">
            <span>🎯 OBJETIVO COMUNITARIO</span>
            <span id="event-stats">0 / 50.000</span>
        </div>
        <div class="progress-bar-bg"><div id="goal-bar" class="progress-bar-fill"></div></div>
    </div>

    <div class="podium" id="podiumContainer"></div>

    <div class="stats-row">
        <div class="stat-box"><small>Supervivientes</small><div id="totalP">0</div></div>
        <div class="stat-box"><small>Total NPC Kills</small><div id="totalN">0</div></div>
        <button onclick="beep(600); cargar()" class="btn-refresh">🔄</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCAR SUPERVIVIENTE..." onkeyup="beep(880); filtrar()">
    </div>

    <table id="tablaRank">
        <thead>
            <tr><th>POS</th><th>NOMBRE / RANGO</th><th>LVL</th><th>ZOMBIES</th><th>PVP</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="pModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarM()" style="float:right; cursor:pointer; color:#00ff41; font-size:30px; font-weight:bold;">&times;</span>
        <div class="avatar-box">👤</div>
        <h2 id="m-nom" style="color:#00ff41; margin:5px 0;">---</h2>
        <div id="m-rango" class="rango-txt">RECLUTA</div>

        <div class="data-grid">
            <div class="data-item"><small>Nivel Actual</small><span id="m-lvl">0</span></div>
            <div class="data-item"><small>PVP Kills</small><span id="m-pvp" style="color:#ff4444;">0</span></div>
            <div class="data-item"><small>NPC Kills</small><span id="m-npc">0</span></div>
            <div class="data-item"><small>XP Total</small><span id="m-xp" style="color:#ffd700;">0</span></div>
        </div>
        
        <p style="font-size:11px; color:#444; margin-top:15px; border-top:1px solid #222; padding-top:10px;">EXPEDIENTE OFICIAL DE SUPERVIVENCIA - PIXEL STORE</p>
    </div>
</div>

<script>
    const SHEET_ID = '1B_pbsnPwrVCwwMXEag7ILOdpav_gss2qVezE5yS-DUQ';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const META = 50000;
    let globalData = [];

    const aCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f) {
        if(aCtx.state==='suspended') aCtx.resume();
        const o=aCtx.createOscillator(); const g=aCtx.createGain();
        o.type="sine"; o.frequency.setValueAtTime(f,aCtx.currentTime);
        g.gain.setValueAtTime(0.02,aCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,aCtx.currentTime+0.1);
        o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime+0.1);
    }

    async function cargar() {
        try {
            const res = await fetch(URL);
            const raw = await res.text();
            const json = JSON.parse(raw.substr(47).slice(0, -2));
            globalData = json.table.rows;
            actualizar(globalData);
        } catch (e) { console.log("Error de carga"); }
    }

    function getR(l) {
        if (l >= 51) return { t: "Leyenda", c: "r-leyenda", m: "💎" };
        if (l >= 31) return { t: "Élite", c: "r-elite", m: "🥇" };
        if (l >= 11) return { t: "Veterano", c: "r-veterano", m: "🥈" };
        return { t: "Recluta", c: "r-recluta", m: "🥉" };
    }

    function actualizar(f) {
        f.sort((a,b) => (b.c[2]?.v || 0) - (a.c[2]?.v || 0));

        // Podio
        document.getElementById("podiumContainer").innerHTML = `
            <div class="podium-card rank-silver"><small>#2</small><h2>${f[1]?.c[1]?.v || "---"}</h2><small>LVL ${f[1]?.c[2]?.v || 0}</small></div>
            <div class="podium-card rank-gold"><div style="font-size:2em;">🥇</div><h2 class="gold-txt">${f[0]?.c[1]?.v || "---"}</h2><small>LVL ${f[0]?.c[2]?.v || 0}</small></div>
            <div class="podium-card rank-bronze"><small>#3</small><h2>${f[2]?.c[1]?.v || "---"}</h2><small>LVL ${f[2]?.c[2]?.v || 0}</small></div>
        `;

        const tbody = document.querySelector("#tablaRank tbody");
        let sn = 0; tbody.innerHTML = "";
        
        f.forEach((r, i) => {
            let nom  = r.c[1]?.v || "---";
            let lvl  = r.c[2]?.v || 0;
            let xp   = r.c[3]?.v || 0;
            let npc  = r.c[4]?.v || 0;
            let pvp  = r.c[5]?.v || 0;
            sn += npc;
            let rg = getR(lvl);
            
            let row = document.createElement("tr");
            row.innerHTML = `<td>${i+1}</td><td><div class="name-cell">${rg.m} ${nom} <span class="rango-txt ${rg.c}">${rg.t}</span></div></td><td>${lvl}</td><td>${npc}</td><td>${pvp}</td>`;
            row.onclick = () => verFicha(nom, lvl, pvp, npc, xp, rg.t, rg.c);
            tbody.appendChild(row);
        });

        document.getElementById("totalP").innerText = f.length;
        document.getElementById("totalN").innerText = sn.toLocaleString();
        document.getElementById("event-stats").innerText = `${sn.toLocaleString()} / ${META.toLocaleString()}`;
        document.getElementById("goal-bar").style.width = Math.min((sn/META)*100, 100) + "%";
    }

    function verFicha(nom, lvl, pvp, npc, xp, rt, rc) {
        beep(400);
        document.getElementById("m-nom").innerText = nom;
        document.getElementById("m-lvl").innerText = lvl;
        document.getElementById("m-pvp").innerText = pvp;
        document.getElementById("m-npc").innerText = npc;
        document.getElementById("m-xp").innerText = xp.toLocaleString();
        document.getElementById("m-rango").innerText = rt;
        document.getElementById("m-rango").className = "rango-txt " + rc;
        document.getElementById("pModal").style.display = "block";
    }

    function cerrarM() { document.getElementById("pModal").style.display = "none"; }
    window.onclick = (e) => { if(e.target == document.getElementById("pModal")) cerrarM(); }

    function filtrar() {
        let t = document.getElementById("searchInput").value.toLowerCase();
        actualizar(globalData.filter(x => (x.c[1]?.v || "").toLowerCase().includes(t)));
    }
    cargar();
</script>
</body>
</html>
