<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Dashboard</title>
    <style>
        /* FONDO Y ESTILO GENERAL */
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1505630285034-888476f7a753?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: rgba(26, 26, 26, 0.9); /* Fondo semi-transparente */
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #00ff41; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px); /* Efecto de desenfoque detrás del panel */
        }

        h1 { 
            color: #00ff41; 
            text-shadow: 0 0 15px #00ff41; 
            margin-bottom: 5px;
            font-size: 2.5em;
        }

        /* Stats */
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px; }
        .stat-box { 
            background: rgba(34, 34, 34, 0.8); 
            padding: 15px; 
            border-radius: 10px; 
            flex: 1; 
            border-bottom: 3px solid #00ff41; 
        }
        .stat-box small { color: #888; font-size: 11px; text-transform: uppercase; }
        .stat-box div { color: #fff; font-size: 24px; font-weight: bold; }

        /* Buscador */
        .search-container { margin-bottom: 20px; display: flex; gap: 10px; }
        #searchInput { 
            flex-grow: 1; 
            padding: 12px; 
            background: rgba(0, 0, 0, 0.7); 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            border-radius: 5px; 
            outline: none; 
        }
        
        .btn-refresh {
            background: #00ff41; 
            color: #000; 
            border: none;
            padding: 0 20px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold;
            font-size: 20px;
            transition: 0.3s;
        }
        .btn-refresh:hover { background: #fff; box-shadow: 0 0 15px #00ff41; }

        /* Tabla Estilo Gamer */
        table { width: 100%; border-collapse: collapse; background: rgba(17, 17, 17, 0.8); border-radius: 10px; overflow: hidden; }
        th { background: #00ff41; color: #000; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        tr:hover { background: rgba(0, 255, 65, 0.1); }

        /* RANGOS */
        .badge { font-size: 18px; margin-right: 8px; }
        .rango-txt { font-size: 10px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 10px; }
        .rango-recluta { color: #cd7f32; border: 1px solid #cd7f32; }
        .rango-veterano { color: #c0c0c0; border: 1px solid #c0c0c0; }
        .rango-elite { color: #ffd700; border: 1px solid #ffd700; text-shadow: 0 0 5px #ffd700; }
        .rango-leyenda { color: #00f2ff; border: 1px solid #00f2ff; text-shadow: 0 0 10px #00f2ff; animation: shine 2s infinite; }

        @keyframes shine { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
        .name-cell { display: flex; align-items: center; justify-content: center; color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>PIXEL STORE</h1>
    <p style="color: #aaa; margin-bottom: 25px;">RPG SURVIVAL - RANKING DE SUPERVIVIENTES</p>

    <div class="stats-row">
        <div class="stat-box"><small>Supervivientes</small><div id="totalP">0</div></div>
        <div class="stat-box"><small>Zombies Eliminados</small><div id="totalN">0</div></div>
        <button class="btn-refresh" onclick="cargar()">🔄</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Rastrear nombre de superviviente..." onkeyup="filtrar()">
    </div>

    <table id="tablaRank">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Nombre / Rango</th>
                <th>Nivel</th>
                <th>NPC</th>
                <th>PVP</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const SHEET_ID = '1B_pbsnPwrVCwwMXEag7ILOdpav_gss2qVezE5yS-DUQ';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    let globalData = [];

    async function cargar() {
        try {
            const res = await fetch(URL);
            const raw = await res.text();
            const json = JSON.parse(raw.substr(47).slice(0, -2));
            globalData = json.table.rows;
            actualizar(globalData);
        } catch (e) { console.log("Error de conexión"); }
    }

    function obtenerRango(nivel) {
        if (nivel >= 51) return { medalla: "💎", clase: "rango-leyenda", titulo: "Leyenda" };
        if (nivel >= 31) return { medalla: "🥇", clase: "rango-elite", titulo: "Élite" };
        if (nivel >= 11) return { medalla: "🥈", clase: "rango-veterano", titulo: "Veterano" };
        return { medalla: "🥉", clase: "rango-recluta", titulo: "Recluta" };
    }

    function actualizar(filas) {
        const tbody = document.querySelector("#tablaRank tbody");
        let sumaNPC = 0;
        
        filas.sort((a,b) => {
            let nA = (a.c[2] && a.c[2].v) ? a.c[2].v : 0;
            let nB = (b.c[2] && b.c[2].v) ? b.c[2].v : 0;
            return nB - nA;
        });

        tbody.innerHTML = "";
        filas.forEach((f, i) => {
            let nom = (f.c[1] && f.c[1].v) ? f.c[1].v : "---";
            let lvl = (f.c[2] && f.c[2].v) ? f.c[2].v : 0;
            let npc = (f.c[4] && f.c[4].v) ? f.c[4].v : 0;
            let pvp = (f.c[5] && f.c[5].v) ? f.c[5].v : 0;
            sumaNPC += npc;
            let rango = obtenerRango(lvl);

            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td>
                    <div class="name-cell">
                        <span class="badge">${rango.medalla}</span>
                        <span>${nom}</span>
                        <span class="rango-txt ${rango.clase}">${rango.titulo}</span>
                    </div>
                </td>
                <td style="font-weight:bold; font-size:18px;">${lvl}</td>
                <td>${npc}</td>
                <td>${pvp}</td>
            </tr>`;
        });
        document.getElementById("totalP").innerText = filas.length;
        document.getElementById("totalN").innerText = sumaNPC.toLocaleString();
    }

    function filtrar() {
        let txt = document.getElementById("searchInput").value.toLowerCase();
        let filtrados = globalData.filter(f => {
            let n = (f.c[1] && f.c[1].v) ? f.c[1].v.toLowerCase() : "";
            return n.includes(txt);
        });
        actualizar(filtrados);
    }
    cargar();
</script>
</body>
</html>
