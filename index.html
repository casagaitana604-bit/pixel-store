<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Tactical Dashboard</title>
    <style>
        /* ESTILOS ORIGINALES RESTAURADOS */
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); background-attachment: fixed; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 0; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; z-index: -1; }
        nav { background: rgba(0, 0, 0, 0.9); padding: 15px; border-bottom: 2px solid #00ff41; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-btn { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .main-panel { background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 15px; border: 1px solid #00ff41; box-shadow: 0 0 50px rgba(0, 255, 65, 0.15); backdrop-filter: blur(10px); }
        h1 { color: #00ff41; text-shadow: 0 0 20px #00ff41; font-size: 3.5em; letter-spacing: 5px; margin: 0; }
        .subtitle { color: #00ff41; opacity: 0.6; letter-spacing: 3px; margin-bottom: 30px; font-size: 12px; text-transform: uppercase; }
        .page { display: none; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .event-container { margin-bottom: 30px; text-align: left; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .event-title { color: #00ff41; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .progress-bar-bg { width: 100%; height: 18px; background: #111; border-radius: 9px; overflow: hidden; border: 1px solid #00ff41; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #004411, #00ff41); width: 0%; transition: 2s ease-in-out; box-shadow: 0 0 15px #00ff41; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 40px 0; }
        .podium-card { background: rgba(0,0,0,0.7); border: 1px solid #333; border-radius: 10px; padding: 20px; flex: 1; transition: 0.3s; }
        .rank-gold { border-top: 5px solid #ffd700; height: 180px; order: 2; }
        .rank-silver { border-top: 5px solid #c0c0c0; height: 150px; order: 1; }
        .rank-bronze { border-top: 5px solid #cd7f32; height: 130px; order: 3; }
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px; }
        .stat-box { background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 10px; flex: 1; border: 1px solid #333; border-bottom: 4px solid #00ff41; }
        .stat-box div { color: #fff; font-size: 26px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.5); border-radius: 10px; overflow: hidden; }
        th { background: #00ff41; color: #000; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .rango-txt { font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 10px; border: 1px solid; }
        .r-recluta { color: #cd7f32; border-color: #cd7f32; }
        .r-veterano { color: #c0c0c0; border-color: #c0c0c0; }
        .r-elite { color: #ffd700; border-color: #ffd700; }
        .r-leyenda { color: #00f2ff; border-color: #00f2ff; }
        .hq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .faction-box { background: rgba(0,0,0,0.7); border-radius: 15px; border: 1px solid #333; padding: 25px; border-top: 6px solid #444; }
        .mil-hq { border-top-color: #4a5d23; }
        .saq-hq { border-top-color: #8b0000; }
        .civ-hq { border-top-color: #0080ff; }
        .member-list { margin-top: 10px; text-align: left; font-size: 11px; border-top: 1px solid #222; padding-top: 8px; max-height: 150px; overflow-y: auto; }
        .member-item { display: flex; justify-content: space-between; padding: 3px 0; color: #aaa; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: #111; margin: 5% auto; padding: 30px; border: 2px solid #00ff41; width: 400px; border-radius: 20px; text-align: center; position: relative; }
        .avatar-box { width: 110px; height: 110px; border: 2px solid #00ff41; border-radius: 15px; margin: 0 auto 15px; background: #000; display: flex; align-items: center; justify-content: center; }
        .avatar-box svg { width: 80px; height: 80px; fill: #00ff41; }
    </style>
</head>
<body>
    <nav>
        <button class="nav-btn active" onclick="changeTab('ranking', this)">🏆 Ranking</button>
        <button class="nav-btn" onclick="changeTab('hq', this)">🪖 Facciones</button>
    </nav>
    <div class="container">
        <div class="main-panel">
            <h1>PIXEL STORE</h1>
            <div class="subtitle">Command Center</div>
            <div id="page-ranking" class="page active">
                <div class="event-container">
                    <div class="event-title"><span>🎯 OBJETIVO</span><span id="event-stats">0 / 50.000</span></div>
                    <div class="progress-bar-bg"><div id="goal-bar" class="progress-bar-fill"></div></div>
                </div>
                <div class="podium" id="podiumContainer"></div>
                <div class="stats-row">
                    <div class="stat-box"><small>Supervivientes</small><div id="totalP">0</div></div>
                    <div class="stat-box"><small>Zombies Totales</small><div id="totalN">0</div></div>
                </div>
                <table id="tablaRank">
                    <thead><tr><th>POS</th><th>NOMBRE</th><th>NIVEL</th><th>ZOMBIES</th><th>PVP</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="page-hq" class="page">
                <div class="hq-grid">
                    <div class="faction-box mil-hq"><h3>MILITARY</h3><div id="cmdt-mil"></div><div class="member-list" id="members-mil"></div></div>
                    <div class="faction-box saq-hq"><h3>RAIDERS</h3><div id="cmdt-saq"></div><div class="member-list" id="members-saq"></div></div>
                    <div class="faction-box civ-hq"><h3>INDEPENDENT</h3><div id="cmdt-civ"></div><div class="member-list" id="members-civ"></div></div>
                </div>
            </div>
        </div>
    </div>
    <div id="pModal" class="modal">
        <div class="modal-content">
            <span onclick="cerrarModal()" style="float:right; cursor:pointer; color:#00ff41; font-size:30px;">&times;</span>
            <div class="avatar-box" id="avatar-display"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>
            <h2 id="m-nom" style="color:#00ff41;">---</h2>
            <div id="m-rango" class="rango-txt">RECLUTA</div>
            <div class="data-grid">
                <div class="data-item"><small>Nivel</small><span id="m-lvl">0</span></div>
                <div class="data-item"><small>Zombies</small><span id="m-npc">0</span></div>
                <div class="data-item"><small>PVP</small><span id="m-pvp">0</span></div>
                <div class="data-item"><small>XP</small><span id="m-xp">0</span></div>
            </div>
        </div>
    </div>
    <script>
        const URL_DATA = 'https://script.google.com/macros/s/AKfycbxTUqN-DmAu91MXj2BjjY29_VFZblYO-oRwq5SD6L-xRW2qffwWdeuiqXG23eIEO5Y/exec';
        async function cargarDatos() {
            try {
                const res = await fetch(URL_DATA + '?t=' + Date.now());
                const data = await res.json();
                renderizar(data);
            } catch (e) { console.error("Error cargando datos", e); }
        }
        function getRangoInfo(n) {
            if (n >= 51) return { t: "Leyenda", c: "r-leyenda", m: "💎" };
            if (n >= 31) return { t: "Élite", c: "r-elite", m: "🥇" };
            if (n >= 11) return { t: "Veterano", c: "r-veterano", m: "🥈" };
            return { t: "Recluta", c: "r-recluta", m: "🥉" };
        }
        function renderizar(facciones) {
            const tbody = document.querySelector("#tablaRank tbody");
            tbody.innerHTML = ""; let todos = []; let totalN = 0;
            document.getElementById('members-mil').innerHTML = ""; document.getElementById('members-saq').innerHTML = ""; document.getElementById('members-civ').innerHTML = "";
            facciones.forEach(fac => {
                let id = fac.status.toLowerCase().includes("militar") ? "mil" : fac.status.toLowerCase().includes("saqueador") ? "saq" : "civ";
                document.getElementById('cmdt-' + id).innerHTML = `<b>${fac.comandante}</b><br><small>Nvl ${fac.nivel}</small>`;
                const lista = document.getElementById('members-' + id);
                fac.lista_integrantes.forEach(j => {
                    todos.push(j); totalN += Number(j.npc || 0);
                    lista.innerHTML += `<div class="member-item"><b>${j.nombre}</b><span>Lvl ${j.nivel}</span></div>`;
                });
            });
            todos.sort((a, b) => b.nivel - a.nivel);
            if(todos.length > 0) {
                document.getElementById("podiumContainer").innerHTML = `<div class="podium-card rank-silver">#2<br><b>${todos[1]?.nombre || ""}</b></div><div class="podium-card rank-gold">🥇<br><b>${todos[0]?.nombre || ""}</b></div><div class="podium-card rank-bronze">#3<br><b>${todos[2]?.nombre || ""}</b></div>`;
                todos.forEach((j, i) => {
                    let rg = getRangoInfo(j.nivel);
                    let tr = document.createElement("tr");
                    tr.innerHTML = `<td>${i+1}</td><td>${rg.m} ${j.nombre} <span class="rango-txt ${rg.c}">${rg.t}</span></td><td>${j.nivel}</td><td>${j.npc || 0}</td><td>${j.pvp || 0}</td>`;
                    tr.onclick = () => {
                        document.getElementById("m-nom").innerText = j.nombre; document.getElementById("m-lvl").innerText = j.nivel;
                        document.getElementById("m-npc").innerText = j.npc || 0; document.getElementById("m-pvp").innerText = j.pvp || 0;
                        document.getElementById("m-xp").innerText = Number(j.xp || 0).toLocaleString();
                        document.getElementById("m-rango").innerText = rg.t; document.getElementById("m-rango").className = "rango-txt " + rg.c;
                        document.getElementById("pModal").style.display = "block";
                    };
                    tbody.appendChild(tr);
                });
            }
            document.getElementById("totalP").innerText = todos.length;
            document.getElementById("totalN").innerText = totalN.toLocaleString();
            document.getElementById("event-stats").innerText = totalN.toLocaleString() + " / 50.000";
            document.getElementById("goal-bar").style.width = Math.min((totalN / 50000) * 100, 100) + "%";
        }
        function cerrarModal() { document.getElementById("pModal").style.display = "none"; }
        function changeTab(t, b) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-' + t).classList.add('active'); b.classList.add('active');
        }
        cargarDatos(); setInterval(cargarDatos, 60000);
    </script>
</body>
</html>
