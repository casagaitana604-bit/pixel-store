<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL STORE - RPG Survival Stats</title>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --dark: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
        }

        .faccion-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .faccion-header {
            border-bottom: 1px solid var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .faccion-name {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 0.9rem;
            gap: 10px;
            margin-bottom: 15px;
            background: #252525;
            padding: 10px;
            border-radius: 8px;
        }

        .jugador-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.85rem;
        }

        .genero-icon {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .male { background: #0055ff; color: white; }
        .female { background: #ff0077; color: white; }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .tag-status {
            font-size: 0.7rem;
            background: var(--secondary);
            padding: 3px 8px;
            border-radius: 10px;
            float: right;
        }
    </style>
</head>
<body>

<header>
    <h1>PIXEL STORE - SISTEMA DE FACCIONES</h1>
    <p>Ranking de Supervivencia y Estadísticas en Vivo</p>
</header>

<div id="loader" class="loading">Cargando datos del servidor de Second Life...</div>
<div id="facciones" class="faccion-container"></div>

<script>
    // REEMPLAZA ESTO CON TU URL DE IMPLEMENTACIÓN
    const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT";

    async function cargarDatos() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            const contenedor = document.getElementById('facciones');
            contenedor.innerHTML = '';

            data.forEach(faccion => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let integrantesHTML = faccion.lista_integrantes.map(j => `
                    <div class="jugador-item">
                        <span>
                            ${j.nombre} 
                            <span class="genero-icon ${j.genero === 'm' ? 'male' : 'female'}">
                                ${j.genero === 'm' ? '♂' : '♀'}
                            </span>
                        </span>
                        <span>LVL ${j.nivel}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="faccion-header">
                        <span class="tag-status">${faccion.status}</span>
                        <h2 class="faccion-name">${faccion.nombre}</h2>
                    </div>
                    <div class="stats-grid">
                        <div><strong>Comandante:</strong><br>${faccion.comandante}</div>
                        <div><strong>Nivel:</strong> ${faccion.nivel}</div>
                        <div><strong>Puntos:</strong> ${faccion.puntos}</div>
                        <div><strong>Miembros:</strong> ${faccion.miembros_total}</div>
                    </div>
                    <div class="lista-jugadores">
                        <h4 style="margin-bottom:10px; border-bottom: 1px solid #333;">Integrantes</h4>
                        ${integrantesHTML || '<p style="font-size:0.8rem; color:#666;">No hay miembros activos</p>'}
                    </div>
                `;
                contenedor.appendChild(card);
            });
        } catch (error) {
            document.getElementById('loader').innerHTML = "Error al conectar con la base de datos.";
            console.error(error);
        }
    }

    // Cargar al iniciar
    cargarDatos();
    // Refrescar cada minuto
    setInterval(cargarDatos, 60000);
</script>

</body>
</html>
