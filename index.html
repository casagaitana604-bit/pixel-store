<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Survival Dashboard</title>
    <style>
        /* ESTILO GLOBAL CYBER-SURVIVAL */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-attachment: fixed;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        .container { 
            max-width: 1000px; margin: auto; 
            background: rgba(20, 20, 20, 0.95);
            padding: 30px; border-radius: 15px; 
            border: 2px solid #00ff41; 
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15);
            backdrop-filter: blur(10px);
        }

        h1 { color: #00ff41; text-shadow: 0 0 20px #00ff41; font-size: 3em; letter-spacing: 5px; margin: 0; }
        .subtitle { color: #00ff41; opacity: 0.6; letter-spacing: 3px; margin-bottom: 30px; font-size: 12px; }

        /* PODIO DE CAMPEONES */
        .podium {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 15px; margin: 40px 0;
        }
        .podium-card {
            background: rgba(0,0,0,0.7); border: 1px solid #333;
            border-radius: 10px; padding: 20px; flex: 1;
            transition: 0.3s; position: relative;
        }
        .rank-gold { border-top: 5px solid #ffd700; height: 180px; box-shadow: 0 0 25px rgba(255,215,0,0.2); order: 2; }
        .rank-silver { border-top: 5px solid #c0c0c0; height: 150px; order: 1; }
        .rank-bronze { border-top: 5px solid #cd7f32; height: 130px; order: 3; }
        
        .podium-card h2 { margin: 10px 0 5px; font-size: 1.1em; color: #fff; overflow: hidden; text-overflow: ellipsis; }
        .podium-number { font-size: 2.5em; font-weight: bold; opacity: 0.3; }
        .gold-txt { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        /* STATS Y BUSCADOR */
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px; }
        .stat-box { 
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 10px; 
            flex: 1; border: 1px solid #333; border-bottom: 4px solid #00ff41; 
        }
        .stat-box small { color: #00ff41; font-size: 11px; text-transform: uppercase; }
        .stat-box div { color: #fff; font-size: 26px; font-weight: bold; }

        .search-container { margin-bottom: 25px; display: flex; gap: 10px; }
        #searchInput { 
            flex-grow: 1; padding: 15px; background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #00ff41; color: #00ff41; border-radius: 8px; outline: none; font-size: 16px;
        }
        
        .btn-refresh {
            background: #00ff41; color: #000; border: none; padding: 0 25px; 
            cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 24px; transition: 0.3s;
        }
        .btn-refresh:hover { background: #fff; transform: scale(1.05); }

        /* TABLA Y RANGOS */
        table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.5); border-radius: 10px; overflow: hidden; }
        th { background: #00ff41; color: #000; padding: 15px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .name-cell { display: flex; align-items: center; justify-content: center; color: #00ff41; font-weight: bold; }
        
        .rango-txt { font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 10px; border: 1px solid; }
        .r-recluta { color: #cd7f32; border-color: #cd7f32; }
        .r-veterano { color: #c0c0c0; border-color: #c0c0c0; }
        .r-elite { color: #ffd700; border-color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        .r-leyenda { color: #00f2ff; border-color: #00f2ff; text-shadow: 0 0 10px #00f2ff; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>PIXEL STORE</h1>
    <div class="subtitle">RPG SURVIVAL SYSTEM - GLOBAL ACCESS</div>

    <div class="podium" id="podiumContainer"></div>

    <div class="stats-row">
        <div class="stat-box"><small>Supervivientes</small><div id="totalP">0</div></div>
        <div class="stat-box"><small>NPC Kills Totales</small><div id="totalN">0</div></div>
        <button class="btn-refresh" onclick="beep(); cargar()">🔄</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCANDO EN LA BASE DE DATOS..." onkeyup="beep(); filtrar()">
    </div>

    <table id="tablaRank">
        <thead>
            <tr>
                <th>POS</th>
                <th>SUPERVIVIENTE / RANGO</th>
                <th>NIVEL</th>
                <th>ZOMBIES</th>
                <th>PVP</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const SHEET_ID = '1B_pbsnPwrVCwwMXEag7ILOdpav_gss2qVezE5yS-DUQ';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    let globalData = [];

    // --- SONIDO TÁCTICO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function cargar() {
        try {
            const res = await fetch(URL);
            const raw = await res.text();
            const json = JSON.parse(raw.substr(47).slice(0, -2));
            globalData = json.table.rows;
            actualizar(globalData);
        } catch (e) { console.error("Error de enlace"); }
    }

    function obtenerRango(nivel) {
        if (nivel >= 51) return { t: "Leyenda", c: "r-leyenda" };
        if (nivel >= 31) return { t: "Élite", c: "r-elite" };
        if (nivel >= 11) return { t: "Veterano", c: "r-veterano" };
        return { t: "Recluta", c: "r-recluta" };
    }

    function actualizar(filas) {
        // Ordenar por nivel (Columna C = index 2)
        filas.sort((a,b) => (b.c[2]?.v || 0) - (a.c[2]?.v || 0));

        // Actualizar Podio
        document.getElementById("podiumContainer").innerHTML = `
            <div class="podium-card rank-silver"><div class="podium-number">2</div><h2>${filas[1]?.c[1]?.v || "---"}</h2><small>LVL ${filas[1]?.c[2]?.v || 0}</small></div>
            <div class="podium-card rank-gold"><div class="podium-number gold-txt">1</div><h2 class="gold-txt">${filas[0]?.c[1]?.v || "---"}</h2><small>LVL ${filas[0]?.c[2]?.v || 0}</small></div>
            <div class="podium-card rank-bronze"><div class="podium-number">3</div><h2>${filas[2]?.c[1]?.v || "---"}</h2><small>LVL ${filas[2]?.c[2]?.v || 0}</small></div>
        `;

        const tbody = document.querySelector("#tablaRank tbody");
        let sumaNPC = 0;
        tbody.innerHTML = "";
        
        filas.forEach((f, i) => {
            let nom = f.c[1]?.v || "---";
            let lvl = f.c[2]?.v || 0;
            let npc = f.c[4]?.v || 0;
            let pvp = f.c[5]?.v || 0;
            sumaNPC += npc;
            let r = obtenerRango(lvl);

            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td><div class="name-cell">${nom} <span class="rango-txt ${r.c}">${r.t}</span></div></td>
                <td style="color:#fff; font-weight:bold; font-size:18px;">${lvl}</td>
                <td>${npc}</td>
                <td>${pvp}</td>
            </tr>`;
        });
        document.getElementById("totalP").innerText = filas.length;
        document.getElementById("totalN").innerText = sumaNPC.toLocaleString();
    }

    function filtrar() {
        let txt = document.getElementById("searchInput").value.toLowerCase();
        let filtrados = globalData.filter(f => (f.c[1]?.v || "").toLowerCase().includes(txt));
        actualizar(filtrados);
    }

    cargar();
</script>
</body>
</html>
