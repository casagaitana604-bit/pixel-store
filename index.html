<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PIXEL STORE - RPG Tactical Dashboard</title>
    <style>
        /* =========================================
           ESTILO GLOBAL (TU DISEÑO ORIGINAL)
           ========================================= */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-attachment: fixed;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-bottom: 2px solid #00ff41;
            display: flex;
            justify-content: center; gap: 20px;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: transparent; border: 1px solid #00ff41; color: #00ff41;
            padding: 10px 25px; cursor: pointer; border-radius: 5px;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41;
        }

        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }

        .main-panel {
            background: rgba(20, 20, 20, 0.95); padding: 30px; 
            border-radius: 15px; border: 1px solid #00ff41; 
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15);
            backdrop-filter: blur(10px);
        }

        h1 { color: #00ff41; text-shadow: 0 0 20px #00ff41; font-size: 3.5em; letter-spacing: 5px; margin: 0; }
        .subtitle { color: #00ff41; opacity: 0.6; letter-spacing: 3px; margin-bottom: 30px; font-size: 12px; text-transform: uppercase; }

        .page { display: none; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* RANKING Y OBJETIVOS */
        .event-container { 
            margin-bottom: 30px; text-align: left; background: rgba(0,0,0,0.6); 
            padding: 15px; border-radius: 10px; border: 1px solid #333; 
        }
        .event-title { color: #00ff41; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .progress-bar-bg { width: 100%; height: 18px; background: #111; border-radius: 9px; overflow: hidden; border: 1px solid #00ff41; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #004411, #00ff41); width: 0%; transition: 2s ease-in-out; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 40px 0; }
        .podium-card { background: rgba(0,0,0,0.7); border: 1px solid #333; border-radius: 10px; padding: 20px; flex: 1; }
        .rank-gold { border-top: 5px solid #ffd700; height: 180px; box-shadow: 0 0 25px rgba(255,215,0,0.2); order: 2; }
        .rank-silver { border-top: 5px solid #c0c0c0; height: 150px; order: 1; }
        .rank-bronze { border-top: 5px solid #cd7f32; height: 130px; order: 3; }

        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px; }
        .stat-box { background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 10px; flex: 1; border: 1px solid #333; border-bottom: 4px solid #00ff41; }
        .stat-box small { color: #00ff41; font-size: 11px; }
        .stat-box div { color: #fff; font-size: 26px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.5); border-radius: 10px; overflow: hidden; }
        th { background: #00ff41; color: #000; padding: 15px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }

        .rango-txt { font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 10px; border: 1px solid; }
        .r-recluta { color: #cd7f32; border-color: #cd7f32; }
        .r-veterano { color: #c0c0c0; border-color: #c0c0c0; }
        .r-elite { color: #ffd700; border-color: #ffd700; }
        .r-leyenda { color: #00f2ff; border-color: #00f2ff; }

        /* FACCIONES HQ */
        .hq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .faction-box { background: rgba(0,0,0,0.7); border-radius: 15px; padding: 25px; border-top: 6px solid #444; }
        .mil-hq { border-top-color: #4a5d23; }
        .saq-hq { border-top-color: #8b0000; }
        .civ-hq { border-top-color: #0080ff; }
        .member-list { margin-top: 10px; text-align: left; font-size: 11px; border-top: 1px solid #222; padding-top: 8px; max-height: 150px; overflow-y: auto; }
        .member-item { display: flex; justify-content: space-between; padding: 3px 0; color: #aaa; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: #111; margin: 5% auto; padding: 30px; border: 2px solid #00ff41; width: 400px; border-radius: 20px; position: relative; }
        .avatar-box { width: 110px; height: 110px; border: 2px solid #00ff41; border-radius: 15px; margin: 0 auto 15px; background: #000; display: flex; align-items: center; justify-content: center; }
        .avatar-box svg { width: 80px; height: 80px; fill: #00ff41; }
        .gender-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .gender-btn { background: #222; border: 1px solid #444; color: #888; padding: 6px 15px; border-radius: 5px; cursor: pointer; }
        .gender-btn.active { background: #00ff41; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <button class="nav-btn active" onclick="changeTab('ranking', this)">🏆 Ranking Global</button>
        <button class="nav-btn" onclick="changeTab('hq', this)">🪖 Facciones</button>
    </nav>

    <div class="container">
        <div class="main-panel">
            <h1>PIXEL STORE</h1>
            <div class="subtitle">Command Center</div>

            <div id="page-ranking" class="page active">
                <div class="event-container">
                    <div class="event-title"><span>🎯 OBJETIVO: GRAN CACERÍA</span><span id="event-stats">0 / 50.000</span></div>
                    <div class="progress-bar-bg"><div id="goal-bar" class="progress-bar-fill"></div></div>
                </div>
                <div class="podium" id="podiumContainer"></div>
                <div class="stats-row">
                    <div class="stat-box"><small>Supervivientes</small><div id="totalP">0</div></div>
                    <div class="stat-box"><small>NPC Kills</small><div id="totalN">0</div></div>
                </div>
                <table id="tablaRank">
                    <thead><tr><th>POS</th><th>NOMBRE</th><th>NIVEL</th><th>ZOMBIES</th><th>PVP</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div id="page-hq" class="page">
                <div class="hq-grid">
                    <div class="faction-box mil-hq"><h3>MILITARY</h3><div id="comandante-mil"></div><div class="member-list" id="members-mil"></div></div>
                    <div class="faction-box saq-hq"><h3>RAIDERS</h3><div id="comandante-saq"></div><div class="member-list" id="members-saq"></div></div>
                    <div class="faction-box civ-hq"><h3>INDEPENDENT</h3><div id="comandante-civ"></div><div class="member-list" id="members-civ"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pModal" class="modal">
        <div class="modal-content">
            <span onclick="cerrarModal()" style="float:right; cursor:pointer; color:#00ff41; font-size:30px;">&times;</span>
            <div class="avatar-box" id="avatar-display"></div>
            <div class="gender-selector">
                <button id="btn-m" class="gender-btn" onclick="cambiarAvatar('m')">HOMBRE</button>
                <button id="btn-f" class="gender-btn" onclick="cambiarAvatar('f')">MUJER</button>
            </div>
            <h2 id="m-nom" style="color:#00ff41;">---</h2>
            <div id="m-rango" class="rango-txt">RECLUTA</div>
            <div id="m-faccion-txt" style="font-size:11px; margin:10px 0;"></div>
            <div class="data-grid">
                <div class="data-item"><small>Nivel</small><span id="m-lvl">0</span></div>
                <div class="data-item"><small>Zombies</small><span id="m-npc">0</span></div>
                <div class="data-item"><small>PVP</small><span id="m-pvp">0</span></div>
                <div class="data-item"><small>XP</small><span id="m-xp">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const URL_DATA = 'https://script.google.com/macros/s/AKfycbxTUqN-DmAu91MXj2BjjY29_VFZblYO-oRwq5SD6L-xRW2qffwWdeuiqXG23eIEO5Y/exec';
        let currentUUID = "";
        const iconSet = {
            m: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>',
            f: '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
        };

        async function cargarDatos() {
            try {
                const res = await fetch(URL_DATA);
                const data = await res.json();
                renderizar(data);
            } catch (e) { console.error("Error cargando datos", e); }
        }

        function getRangoInfo(nivel) {
            if (nivel >= 51) return { t: "Leyenda", c: "r-leyenda", m: "💎" };
            if (nivel >= 31) return { t: "Élite", c: "r-elite", m: "🥇" };
            if (nivel >= 11) return { t: "Veterano", c: "r-veterano", m: "🥈" };
            return { t: "Recluta", c: "r-recluta", m: "🥉" };
        }

        function renderizar(facciones) {
            const tbody = document.querySelector("#tablaRank tbody");
            tbody.innerHTML = "";
            let todos = [];
            let totalNPC = 0;

            document.getElementById('members-mil').innerHTML = "";
            document.getElementById('members-saq').innerHTML = "";
            document.getElementById('members-civ').innerHTML = "";

            facciones.forEach(fac => {
                let id = fac.status.toLowerCase().includes("militar") ? "mil" : fac.status.toLowerCase().includes("saqueador") ? "saq" : "civ";
                document.getElementById('comandante-' + id).innerHTML = `<b>${fac.comandante}</b><br><small>Nvl ${fac.nivel}</small>`;
                
                const listaUI = document.getElementById('members-' + id);
                fac.lista_integrantes.forEach(j => {
                    j.faccion_nombre = fac.nombre;
                    todos.push(j);
                    totalNPC += (Number(j.npc) || 0);
                    listaUI.innerHTML += `<div class="member-item"><b>${j.nombre}</b> <span>Lvl ${j.nivel}</span></div>`;
                });
            });

            todos.sort((a, b) => b.nivel - a.nivel);
            
            if(todos.length > 0) {
                document.getElementById("podiumContainer").innerHTML = `
                    <div class="podium-card rank-silver"><small>#2</small><br><b>${todos[1]?.nombre || "---"}</b></div>
                    <div class="podium-card rank-gold">🥇<br><b>${todos[0]?.nombre || "---"}</b></div>
                    <div class="podium-card rank-bronze"><small>#3</small><br><b>${todos[2]?.nombre || "---"}</b></div>
                `;
                todos.forEach((j, i) => {
                    let rg = getRangoInfo(j.nivel);
                    let tr = document.createElement("tr");
                    tr.innerHTML = `<td>${i+1}</td><td>${rg.m} ${j.nombre} <span class="rango-txt ${rg.c}">${rg.t}</span></td><td>${j.nivel}</td><td>${j.npc || 0}</td><td>${j.pvp || 0}</td>`;
                    tr.onclick = () => abrirFicha(j, rg.t, rg.c);
                    tbody.appendChild(tr);
                });
            }

            document.getElementById("totalP").innerText = todos.length;
            document.getElementById("totalN").innerText = totalNPC.toLocaleString();
            document.getElementById("event-stats").innerText = `${totalNPC.toLocaleString()} / 50.000`;
            document.getElementById("goal-bar").style.width = Math.min((totalNPC / 50000) * 100, 100) + "%";
        }

        function abrirFicha(j, rt, rc) {
            currentUUID = j.uuid;
            cambiarAvatar(j.genero || 'm', false);
            document.getElementById("m-nom").innerText = j.nombre;
            document.getElementById("m-lvl").innerText = j.nivel;
            document.getElementById("m-npc").innerText = j.npc || 0;
            document.getElementById("m-pvp").innerText = j.pvp || 0;
            document.getElementById("m-xp").innerText = (Number(j.xp) || 0).toLocaleString();
            document.getElementById("m-rango").innerText = rt;
            document.getElementById("m-rango").className = "rango-txt " + rc;
            document.getElementById("m-faccion-txt").innerText = "Afiliación: " + j.faccion_nombre;
            document.getElementById("pModal").style.display = "block";
        }

        function cambiarAvatar(gender, guardar = true) {
            document.getElementById('avatar-display').innerHTML = iconSet[gender];
            document.getElementById('btn-m').classList.toggle('active', gender === 'm');
            document.getElementById('btn-f').classList.toggle('active', gender === 'f');
            if (guardar && currentUUID) {
                fetch(`${URL_DATA}?id=${currentUUID}&genero=${gender}&action=setGender`, { mode: 'no-cors' });
            }
        }

        function cerrarModal() { document.getElementById("pModal").style.display = "none"; }
        function changeTab(t, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + t).classList.add('active');
            btn.classList.add('active');
        }

        cargarDatos();
        setInterval(cargarDatos, 60000);
    </script>
</body>
</html>
